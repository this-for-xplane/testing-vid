<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seamless Video</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

video {
    position: absolute;
    inset: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;

    transition: opacity 0.05s linear;
}
</style>
</head>
<body>

<video id="a"
       autoplay
       muted
       playsinline
       preload="auto"
       src="33418281-0697-4d4e-bcfb-02916b3e57df.webm"></video>

<video id="b"
       muted
       playsinline
       preload="auto"
       loop
       src="440dbf4c-2753-41cd-9d7d-9492f779d3ff.webm"
       style="opacity:0;"></video>

<script>
const a = document.getElementById("a");
const b = document.getElementById("b");

// B 미리 버퍼
b.load();

// A 끝나기 전에 B
a.addEventListener("timeupdate", async () => {
    // 끝나기 0.15초 전?
    if (a.duration - a.currentTime < 0.15) 
        
        if (b.dataset.started) return;
        b.dataset.started = "1";

        try {
            // B 시작
            await b.play();

            // 화면 전환
            b.style.opacity = "1";
            a.style.opacity = "0";

            setTimeout(() => {
                a.pause();
                a.removeAttribute("src");
                a.load();
            }, 100);

        } catch (e) {
            console.error(e);
        }
    }
});
</script>

</body>
</html>
