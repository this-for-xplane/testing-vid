<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> test1 </title>
    
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

video {
    position: absolute;
    inset: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;

    transition: opacity 0.03s linear;
}
</style>
</head>
<body>

<video id="a"
       autoplay
       muted
       playsinline
       preload="auto"
       src="33418281-0697-4d4e-bcfb-02916b3e57df.webm"></video>

<video id="b"
       muted
       playsinline
       preload="auto"
       loop
       src="440dbf4c-2753-41cd-9d7d-9492f779d3ff.webm"
       style="opacity:0;"></video>

<script>
const a = document.getElementById("a");
const b = document.getElementById("b");

let switched = false;

// B preload
b.load();

const interval = setInterval(async function () {

    if (switched) return;
    
    if (
        a.duration &&
        (a.duration - a.currentTime) <= 0.033
    ) {

        switched = true;

        try {

            await b.play();

            b.style.opacity = "1";
            a.style.opacity = "0";

            setTimeout(function () {
                a.pause();
                a.removeAttribute("src");
                a.load();
            }, 50);

            clearInterval(interval);

        } catch (e) {
            console.error(e);
        }
    }

}, 5);
</script>

</body>
</html>
